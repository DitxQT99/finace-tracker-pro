<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Finance Tracker Pro</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>Finance Tracker Pro</h1>
            <div class="user-info">
                <span>Welcome, <span id="username"></span>!</span>
                <button class="btn-secondary" id="exportPDF">📄 Export PDF</button>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="cards-grid">
            <div class="card income">
                <h3>Total Income</h3>
                <div class="amount" id="totalIncome">$0.00</div>
            </div>
            <div class="card expense">
                <h3>Total Expense</h3>
                <div class="amount" id="totalExpense">$0.00</div>
            </div>
            <div class="card balance">
                <h3>Current Balance</h3>
                <div class="amount" id="balance">$0.00</div>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="add-transaction">
            <h3>Add New Transaction</h3>
            <form id="transactionForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <input type="text" id="category" placeholder="e.g. Salary, Food" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description (optional)</label>
                        <input type="text" id="description" placeholder="Notes">
                    </div>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>

        <!-- Date Filters -->
        <div class="filters">
            <div class="filter-group">
                <label for="filterDay">Day:</label>
                <select id="filterDay"></select>
            </div>
            <div class="filter-group">
                <label for="filterMonth">Month:</label>
                <select id="filterMonth"></select>
            </div>
            <div class="filter-group">
                <label for="filterYear">Year:</label>
                <select id="filterYear"></select>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-container">
            <div class="chart-card">
                <h3>Monthly Income</h3>
                <canvas id="incomeChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Monthly Expense</h3>
                <canvas id="expenseChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Income vs Expense</h3>
                <canvas id="comparisonChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Expense by Category</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="transactions-section">
            <h3>Transaction History</h3>
            <table>
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Date & Time</th>
                    </tr>
                </thead>
                <tbody id="transactionsBody">
                    <!-- populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="/app.js"></script>
</body>
</html>
